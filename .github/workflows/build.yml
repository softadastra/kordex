name: Build Kordex

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            ninja-build \
            g++ \
            gcc \
            ccache \
            git \
            curl \
            tar

      - name: Configure Kordex
        run: |
          cmake -S . -B build-ninja -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DKORDEX_ENABLE_QUICKJS=ON \
            -DKORDEX_ENABLE_NATIVE_ENGINE=OFF \
            -DKORDEX_BUILD_APP=ON

      - name: Build Kordex
        run: |
          cmake --build build-ninja --target all --parallel 2

      - name: Check binary
        run: |
          ./build-ninja/bin/kordex --version

      - name: Create real TypeScript test project
        run: |
          mkdir -p test-app/src/utils

          cat > test-app/kordex.json <<'EOF'
          {
            "name": "test-app",
            "version": "0.1.0",
            "entry": "src/main.ts"
          }
          EOF

          cat > test-app/src/utils/greeting.ts <<'EOF'
          export function greeting(name: string): string {
            return "Hello " + name + " from Kordex";
          }
          EOF

          cat > test-app/src/main.ts <<'EOF'
          import { greeting } from "./utils/greeting.ts";

          const name: string = "CI";
          const message: string = greeting(name);

          export default message;
          EOF

      - name: Run TypeScript through Kordex
        run: |
          cd test-app
          ../build-ninja/bin/kordex run | tee output.txt
          grep "Hello CI from Kordex" output.txt

      - name: Package executable
        run: |
          mkdir -p dist
          cp build-ninja/bin/kordex dist/kordex
          tar -czf kordex-linux-x86_64.tar.gz -C dist kordex

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: kordex-linux-x86_64
          path: kordex-linux-x86_64.tar.gz
